services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Внутри Docker-сети клиенты подключаются по имени kafka:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-init
    depends_on:
      - kafka
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command: |
      echo "Ожидание Kafka..."
      for i in $(seq 1 60); do
        kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1 && break
        sleep 2
      done
      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:9092 \
        --topic sales-topic \
        --partitions 1 \
        --replication-factor 1
      echo "Топик sales-topic готов"

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  kafka-producer:
    image: python:3.9-slim
    container_name: kafka-producer
    working_dir: /app
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./исходные данные:/app/data
      - ./kafka_producer.py:/app/kafka_producer.py
      - ./requirements.txt:/app/requirements.txt
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python kafka_producer.py"
    restart: "no"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: sales-topic

  flink-jobmanager:
    image: flink:1.17.1-scala_2.12
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    volumes:
      - ./flink-app.jar:/opt/flink/usrlib/flink-app.jar

  flink-taskmanager:
    image: flink:1.17.1-scala_2.12
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
    volumes:
      - ./flink-app.jar:/opt/flink/usrlib/flink-app.jar

volumes:
  postgres_data: